<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territory Completion Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top status bar ─────────────────────────────────────────── -->
  <header class="status-bar">
    <div class="app-title">
      <span class="title-icon">◈</span>
      MONUMENTO TERRITORY MAP
    </div>
    <div class="meta-cluster">
<span class="timestamp" id="last-updated">NOT SYNCED</span>
      <button class="submit-btn" id="submit-btn" title="Submit a completed territory">
        ✚ SUBMIT TERRITORY
      </button>
      <button class="settings-btn" id="settings-btn" title="Open settings" aria-label="Open settings">⚙</button>
      <button class="refresh-btn" id="refresh-btn" title="Refresh territory data">
        <span class="btn-icon">↻</span>
        REFRESH MAP
      </button>
    </div>
  </header>

  <!-- ── Filter bar ────────────────────────────────────────────── -->
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label" for="filter-status">STATUS</label>
      <select class="filter-select" id="filter-status">
        <option value="">All Statuses</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label" for="filter-remarks">REMARKS</label>
      <select class="filter-select" id="filter-remarks">
        <option value="">All Remarks</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label" for="filter-date-from">FROM DATE</label>
      <input class="filter-input" type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label class="filter-label" for="filter-date-to">TO DATE</label>
      <input class="filter-input" type="date" id="filter-date-to">
    </div>
    <button class="btn-clear" id="clear-filters" title="Clear all filters">✕ CLEAR</button>
    <span class="filter-result-count" id="filter-result-count"></span>
  </div>

  <!-- ── Main content ───────────────────────────────────────────── -->
  <main class="viewport">

    <!-- Error banner (hidden unless fetch fails) -->
    <div class="error-banner hidden" id="error-banner" role="alert"></div>

    <!-- Map card -->
    <div class="map-card">

      <!-- Loading overlay -->
      <div class="spinner-wrap" id="loading-spinner">
        <div class="spinner"></div>
        <span class="spinner-label">Fetching territory data&hellip;</span>
      </div>

      <!-- Map image + canvas overlay container -->
      <div class="map-container" id="map-container">
        <img
          id="map-image"
          src="[BOE PREFERRED] 2025 MONUMENTO TERRITORY MAP (2)_page-0001.jpg"
          alt="2025 Monumento Territory Map"
          loading="lazy"
        >
        <!-- Canvas is sized + positioned by app.js -->
        <canvas id="overlay-canvas" aria-hidden="true"></canvas>
      </div>

    </div><!-- /map-card -->

  </main>

  <!-- ── Settings Backdrop ──────────────────────────────────────── -->
  <div class="settings-backdrop hidden" id="settings-backdrop" aria-hidden="true"></div>

  <!-- ── Settings Drawer ───────────────────────────────────────── -->
  <aside class="settings-drawer hidden" id="settings-drawer" role="dialog" aria-modal="true" aria-label="Settings">

    <header class="settings-drawer-header">
      <span class="settings-drawer-title">⚙ SETTINGS</span>
      <button class="settings-close-btn" id="settings-close-btn" aria-label="Close settings">✕</button>
    </header>

    <div class="settings-drawer-body">

      <!-- Section: Overlay Colors -->
      <section class="settings-section">
        <h2 class="settings-section-title">OVERLAY COLORS</h2>

        <div class="settings-row">
          <label class="settings-label" for="s-fill-color">FINISHED FILL</label>
          <div class="color-control">
            <input type="color" class="color-picker" id="s-fill-color">
            <input type="range" class="alpha-slider" id="s-fill-alpha" min="0" max="1" step="0.01" value="0.70">
            <span class="alpha-readout" id="s-fill-alpha-out">70%</span>
          </div>
        </div>

        <div class="settings-row">
          <label class="settings-label" for="s-stroke-color">FINISHED BORDER</label>
          <div class="color-control">
            <input type="color" class="color-picker" id="s-stroke-color">
            <input type="range" class="alpha-slider" id="s-stroke-alpha" min="0" max="1" step="0.01" value="0.97">
            <span class="alpha-readout" id="s-stroke-alpha-out">97%</span>
          </div>
        </div>

        <div class="settings-row">
          <label class="settings-label" for="s-fill-color-uf">UNFINISHED FILL</label>
          <div class="color-control">
            <input type="color" class="color-picker" id="s-fill-color-uf">
            <input type="range" class="alpha-slider" id="s-fill-alpha-uf" min="0" max="1" step="0.01" value="0.57">
            <span class="alpha-readout" id="s-fill-alpha-uf-out">57%</span>
          </div>
        </div>

        <div class="settings-row">
          <label class="settings-label" for="s-stroke-color-uf">UNFINISHED BORDER</label>
          <div class="color-control">
            <input type="color" class="color-picker" id="s-stroke-color-uf">
            <input type="range" class="alpha-slider" id="s-stroke-alpha-uf" min="0" max="1" step="0.01" value="1.0">
            <span class="alpha-readout" id="s-stroke-alpha-uf-out">100%</span>
          </div>
        </div>

        <div class="settings-row">
          <label class="settings-label" for="s-label-color">LABEL TEXT COLOR</label>
          <div class="color-control">
            <input type="color" class="color-picker" id="s-label-color">
          </div>
        </div>

        <button class="settings-action-btn" id="s-apply-colors">APPLY COLORS</button>
        <button class="settings-action-btn settings-action-btn--ghost" id="s-reset-colors">RESET TO DEFAULTS</button>
      </section>

      <!-- Section: Territory Coordinates -->
      <section class="settings-section">
        <h2 class="settings-section-title">TERRITORY COORDINATES</h2>
        <p class="settings-hint">Values are % of map image size (0–100). Edit then tap Save.</p>
        <div class="coords-list" id="coords-list">
          <!-- Populated by JS -->
        </div>
        <button class="settings-action-btn" id="s-apply-coords">SAVE COORDINATES</button>
        <button class="settings-action-btn settings-action-btn--ghost" id="s-reset-coords">RESET TO DEFAULTS</button>
      </section>

    </div><!-- /settings-drawer-body -->
  </aside>

  <!-- ── Form Modal Backdrop ───────────────────────────────────── -->
  <div class="form-backdrop hidden" id="form-backdrop" aria-hidden="true"></div>

  <!-- ── Form Modal ────────────────────────────────────────────── -->
  <div class="form-modal hidden" id="form-modal" role="dialog" aria-modal="true" aria-label="Submit Completed Territory">
    <header class="form-modal-header">
      <span class="form-modal-title">✚ SUBMIT COMPLETED TERRITORY</span>
      <button class="form-close-btn" id="form-close-btn" aria-label="Close form">✕</button>
    </header>
    <div class="form-modal-body">
      <iframe
        id="form-iframe"
        src="https://docs.google.com/forms/d/e/1FAIpQLSfKnITtgNWD69j2EUGD6vSTfwKLkWdZ9G8FdKZkLW73Xmvmjw/viewform?embedded=true"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Submit Completed Territory Form"
      >Loading form…</iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
